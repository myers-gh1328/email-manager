name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version, for example v0.1.0'
        required: true
        type: string

permissions:
  contents: write

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref }}
          fetch-depth: 0

      - name: Resolve version
        id: version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            version="${{ inputs.version }}"
          else
            version="${GITHUB_REF_NAME}"
          fi

          if [[ ! "$version" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Release version must look like v0.1.0" >&2
            exit 1
          fi

          if ! git rev-parse -q --verify "refs/tags/$version" >/dev/null; then
            echo "Release tag $version does not exist. Create and push the reviewed tag before running this workflow." >&2
            exit 1
          fi

          package_version="v$(node -p "require('./package.json').version")"
          if [ "$version" != "$package_version" ]; then
            echo "Tag/input version $version does not match package.json $package_version" >&2
            exit 1
          fi

          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run project gate
        run: npm run agent:check

  desktop:
    name: Desktop ${{ matrix.name }}
    needs: validate
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows
            os: windows-latest
            command: npm run desktop:dist:win
            artifact: |
              release/electron/*.exe
              release/electron/*.blockmap
              release/electron/latest*.yml
          - name: macOS
            os: macos-latest
            command: npm run desktop:dist:mac
            artifact: |
              release/electron/*.dmg
              release/electron/*.blockmap
              release/electron/latest*.yml
          - name: Linux
            os: ubuntu-latest
            command: npm run desktop:dist:linux
            artifact: |
              release/electron/*.AppImage
              release/electron/*.deb
              release/electron/*.blockmap
              release/electron/latest*.yml

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          ref: ${{ needs.validate.outputs.version }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build desktop package
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
        run: ${{ matrix.command }}

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: training-communications-studio-${{ needs.validate.outputs.version }}-${{ matrix.name }}
          path: ${{ matrix.artifact }}
          if-no-files-found: error
          retention-days: 14

  github-release:
    name: GitHub release
    needs:
      - validate
      - desktop
    runs-on: ubuntu-latest

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.validate.outputs.version }}
          name: Training Communications Studio ${{ needs.validate.outputs.version }}
          draft: true
          files: artifacts/*
